<!DOCTYPE html>

<html>

<head>

<title>Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);

}


.container{

    width:350px;
}


form{

    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);

}


h2{

    text-align:center;
    margin-bottom:25px;
    color:#333;

}


input{

    width:100%;
    padding:12px;
    margin-bottom:18px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;

}


input:focus{

    outline:none;
    border-color:#667eea;

}


button{

    width:100%;
    padding:12px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;

}


button:hover{

    background:#5563c1;

}


.login-link{

    display:block;
    text-align:center;
    margin-top:20px;
    color:white;
    text-decoration:none;
    font-size:15px;

}


.login-link:hover{

    text-decoration:underline;

}


.message{

    text-align:center;
    margin-top:15px;
    color:white;
    font-size:16px;

}


</style>

</head>


<body>


<div class="container">


<form method="POST">

{% csrf_token %}


<h2>Register</h2>


<input type="text" name="username" placeholder="Username" required>


<input type="password" name="password" placeholder="Password" required>


<button type="submit">
Register
</button>


</form>


<a class="login-link" href="/">
Back to Login
</a>


<h3 class="message">
{{message}}
</h3>


</div>


</body>


</html>
